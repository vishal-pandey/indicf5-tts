name: Release and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest release version
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null) || latest="none"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: version
        run: |
          latest="${{ steps.latest.outputs.latest }}"
          if [ "$latest" = "none" ] || [ -z "$latest" ] || echo "$latest" | grep -q "Not Found"; then
            version="v0.0.1"
          else
            base="${latest#v}"
            major=$(echo "$base" | cut -d. -f1)
            minor=$(echo "$base" | cut -d. -f2)
            patch=$(echo "$base" | cut -d. -f3)
            patch=$((patch + 1))
            version="v${major}.${minor}.${patch}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next version: $version"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

  build-and-push:
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        include:
          - image: indicf5-tts
            context: .
            dockerfile: ./Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/indicf5-tts:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/indicf5-tts:latest

# CheckIn